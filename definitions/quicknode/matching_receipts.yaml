summary: このオブジェクトは、イベントに関連する詳細な情報を格納します。マッチしたレシート、ログ、およびトランザクションに関する情報（アドレス、タイムスタンプ、ガス使用量など）が含まれ、イベントの実行状況を把握するために使用されます。
fields:
- path: matchingReceipts
  description: マッチしたレシープのリストを含む配列。
  ai_generated: true
- path: to
  description: レシープを受け取ったコントラクトのアドレス。
  ai_generated: true
- path: from
  description: レシープを送信したコントラクトのアドレス。
  ai_generated: true
- path: logs
  description: コントラクトで発生したイベントのログのリスト。
  ai_generated: true
- path: data
  description: ログデータそのものです。イベントの種類と関連するデータをエンコードしたバイト配列。
  ai_generated: true
- path: topics
  description: ログのトピック（イベントの種類を識別するハッシュ）の配列。
  ai_generated: true
- path: address
  description: ログを生成したコントラクトのアドレス。
  ai_generated: true
- path: removed
  description: ログが削除されたかどうかを示すブール値。
  ai_generated: true
- path: logIndex
  description: ログのインデックス。ログのリスト内でログの順序を識別するために使用されます。
  ai_generated: true
- path: blockHash
  description: ログが生成されたブロックのハッシュ。ブロックを識別するために使用されます。
  ai_generated: true
- path: blockNumber
  description: ログが生成されたブロックの番号。ブロックを識別するために使用されます。
  ai_generated: true
- path: blockTimestamp
  description: ログが生成されたブロックのタイムスタンプ。ブロックの生成時間を識別するために使用されます。
  ai_generated: true
- path: transactionHash
  description: トランザクションのハッシュ。
  ai_generated: true
- path: transactionIndex
  description: トランザクション内でログのインデックス。
  ai_generated: true
- path: type
  description: イベントのタイプを示す値。イベントの種類を識別するために使用されます。
  ai_generated: true
- path: status
  description: イベントのステータスを示す値。イベントが成功したかどうかを示します。
  ai_generated: true
- path: gasUsed
  description: イベントの実行に必要なガスの量を表します。
  ai_generated: true
- path: logsBloom
  description: ログのブーム。ブームは、ログに含まれるデータに関する情報を提供します。
  ai_generated: true
- path: contractAddress
  description: コントラクトのアドレス。
  ai_generated: true
- path: cumulativeGasUsed
  description: トランザクションの実行に必要なガスの量を表します。
  ai_generated: true
- path: effectiveGasPrice
  description: トランザクションの実行に必要なガスの価格です。
  ai_generated: true
