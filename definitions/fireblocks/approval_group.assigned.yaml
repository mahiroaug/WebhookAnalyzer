summary: このWebhookは、イベントに関する様々な情報を提供します。これには、イベントのトリガーユーザー、イベントの種類、関連するアイテムやタスク、およびイベントの実行環境などの詳細が含まれます。
fields:
- path: user
  description: Webhookをトリガーしたユーザーの情報。
  ai_generated: true
- path: event
  description: 発生したイベントの種類。
  ai_generated: true
- path: title
  description: イベントに関連するアイテムやタスクのタイトル。
  ai_generated: true
- path: userId
  description: イベントに関連するユーザーの識別子。
  ai_generated: true
- path: request
  description: イベントに関連するリクエストの内容。
  ai_generated: true
- path: subject
  description: イベントの対象となるアイテムやタスクの主語。
  ai_generated: true
- path: category
  description: イベントが属するカテゴリ。
  ai_generated: true
- path: eventKey
  description: イベントの種類を識別するためのキー。
  ai_generated: true
- path: createdAt
  description: イベントの作成日時。
  ai_generated: true
- path: groupName
  description: イベントに関連するグループの名前。
  ai_generated: true
- path: threshold
  description: イベントに関連する閾値の説明。
  ai_generated: true
- path: workspace
  description: イベントが実行されているワークスペースの名前。
  ai_generated: true
- path: categoryId
  description: イベントが属するカテゴリのID。
  ai_generated: true
- path: description
  description: イベントの説明。
  ai_generated: true
- path: ownerApproval
  description: イベントの承認の必要性を示す。
  ai_generated: true
- path: notificationSubject
  description: Webhookで送信される通知の件名。
  ai_generated: true
