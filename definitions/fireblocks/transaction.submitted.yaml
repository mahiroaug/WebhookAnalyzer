summary: これらのフィールドは、トランザクションに関する重要な情報を伝達するために使用されます。 各フィールドは、トランザクションの識別、生成元、宛先、ステータス、および関連するコンテキストに関する詳細を提供します。
fields:
- path: txId
  description: トランザクションを一意に識別するための識別子。
  ai_generated: true
- path: note
  description: トランザクションの生成元に関するメモ。
  ai_generated: true
- path: asset
  description: トランザクションで送金された資産（トークン）の識別子。
  ai_generated: true
- path: event
  description: トランザクションのステータスを示すイベント。
  ai_generated: true
- path: title
  description: Webhookのタイトルで、トランザクションに関する情報を簡潔に示します。
  ai_generated: true
- path: subject
  description: Webhookの件名で、トランザクションに関する情報を要約したテキスト。
  ai_generated: true
- path: category
  description: Webhookが属するカテゴリ。
  ai_generated: true
- path: eventKey
  description: イベントの種類を示すキー。
  ai_generated: true
- path: user
  description: トランザクションを生成したユーザーまたはアプリケーションの識別子。
  ai_generated: true
- path: amount
  description: トランザクションの送金額。
  ai_generated: true
- path: destId
  description: トランザクションの宛先ID。
  ai_generated: true
- path: userId
  description: トランザクションを生成したユーザーのID。
  ai_generated: true
- path: destName
  description: トランザクションの宛先の名前。
  ai_generated: true
- path: destType
  description: トランザクションの宛先のタイプ。
  ai_generated: true
- path: sourceId
  description: トランザクションのソースID。
  ai_generated: true
- path: createdAt
  description: Webhookが生成された日時。
  ai_generated: true
- path: workspace
  description: Webhookが関連付けられているワークスペース（環境）。
  ai_generated: true
- path: categoryId
  description: Webhookが属するカテゴリのID。
  ai_generated: true
- path: sourceName
  description: トランザクションのソースの名前。
  ai_generated: true
- path: sourceType
  description: トランザクションのソースのタイプ。
  ai_generated: true
- path: description
  description: トランザクションの説明。
  ai_generated: true
- path: notificationSubject
  description: 通知の件名。
  ai_generated: true
