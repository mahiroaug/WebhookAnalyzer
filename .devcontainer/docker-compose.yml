# =============================================================================
# Webhook Analyzer - Docker Compose 構成
# =============================================================================
# 3つのサービスで構成:
#   1. app    - 開発用メインコンテナ (Python 3.12 + Node.js 20)
#   2. db     - PostgreSQL 16 (Webhook データ保管)
#   3. ollama - ローカル LLM サーバー (Webhook の AI 分類)
#
# このファイルは devcontainer.json から参照され、
# 「Reopen in Container」実行時に自動で docker compose up される。
#
# NVIDIA GPU を使用する場合:
#   docker-compose.gpu.yml を追加で読み込む。
#   詳細は devcontainer.json および README.md を参照。
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # app: 開発コンテナ (FastAPI バックエンド + React フロントエンド)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://webhook:webhook@db:5432/webhook_analyzer
      - OLLAMA_HOST=http://ollama:11434
      - LLM_PROVIDER=ollama

  # ---------------------------------------------------------------------------
  # db: PostgreSQL 16
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: webhook
      POSTGRES_DB: webhook_analyzer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook -d webhook_analyzer"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # ollama: ローカル LLM サーバー
  # ---------------------------------------------------------------------------
  # macOS: Apple Silicon の場合でも CPU モードで動作する
  #        (Docker VM 経由のため GPU パススルー不可)
  # Linux + NVIDIA GPU: docker-compose.gpu.yml を追加で読み込むと GPU を使用可能
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5m
      timeout: 5s
      retries: 12
      start_period: 15s

# =============================================================================
# ボリューム定義
# =============================================================================
volumes:
  pgdata:
  ollama_data:
